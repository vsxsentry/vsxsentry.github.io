const PAGE_SIZE=50;

/* ── Feed Loading ── */
const FEED_LOCAL='feeds/vsxsentry_feed.json';
const FEED_REMOTE='https://raw.githubusercontent.com/mthcht/awesome-lists/refs/heads/main/Lists/VSCODE%20Extensions/feeds/vsxsentry_feed.json';

async function loadFeed(){
  try{const r=await fetch(FEED_LOCAL);if(r.ok)return await r.json()}catch(e){}

}

/* ── Dashboard ── */
const DASHBOARD_DESC=`VS Code is the most widely used IDE with over 15 million monthly active users. Every installed extension runs as a native Node.js process with <strong>the same privileges as VS Code itself</strong> - unrestricted access to the filesystem, network, child processes, environment variables, SSH keys, cloud credentials, and all source code in the workspace. There is no sandbox, no permission model, and no user consent beyond clicking "Install".

Between 2024 and 2026, attackers exploited this architecture at scale. Researchers found <strong>over 1,200 extensions with confirmed malicious code</strong> on the official Marketplace, collectively reaching 229 million installs. Campaigns include typo-squatted developer tools like prettier-vscode-plus deploying the <a href="https://hunt.io/blog/malicious-vscode-extension-anivia-octorat-attack-chain" target="_blank" style="color:#58a6ff;text-decoration:none">Anivia loader and OctoRAT</a>, cryptominer-laden fake utilities like TigerJack's C++ Playground and HTTP Format extensions <a href="https://www.bleepingcomputer.com/news/security/malicious-crypto-stealing-vscode-extensions-resurface-on-openvsx/" target="_blank" style="color:#58a6ff;text-decoration:none">still active on OpenVSX</a> after 17,000+ downloads, and the <a href="https://www.wiz.io/blog/supply-chain-risk-in-vscode-extension-marketplaces" target="_blank" style="color:#58a6ff;text-decoration:none">Wiz Research disclosure</a> revealing 100+ extensions leaking publisher access tokens (PATs) - any one of which could have been used to push targeted malware to millions of developers. Microsoft's own <a href="https://github.com/microsoft/vsmarketplace/blob/main/RemovedPackages.md" target="_blank" style="color:#58a6ff;text-decoration:none">RemovedPackages.md</a> now contains thousands of entries and grows weekly.

The attack surface goes beyond code execution. Extensions can register URI handlers to trigger installs remotely, modify workspace settings and <code>devcontainer.json</code> for persistence, access the VS Code credential store (all tokens from every extension are readable by any other extension), auto-propagate via Settings Sync across all synced machines, and reach into remote environments through SSH, WSL, Dev Containers, and Codespaces.

<strong>VSXSentry aggregates these threats into a structured, machine-readable feed</strong> that security teams can operationalize: block malicious extensions via enterprise policy, monitor risky legitimate extensions, generate lookup tables for Splunk/Sentinel/SIEM, and run detection scripts across developer workstations. For browser extension threat intelligence, see <a href="https://extsentry.github.io" target="_blank" style="color:#58a6ff;text-decoration:none">ExtSentry</a>.`;

/* ── Hash routing helper ── */
function useHash(fallback){
  var[hash,setHash]=useState(window.location.hash.slice(1)||fallback);
  useEffect(function(){
    var onHash=function(){setHash(window.location.hash.slice(1)||fallback)};
    window.addEventListener('hashchange',onHash);
    if(!window.location.hash)window.location.hash='#'+fallback;
    return function(){window.removeEventListener('hashchange',onHash)};
  },[]);
  var nav=useCallback(function(h){window.location.hash='#'+h},[]);
  return[hash,nav];
}

  ];

  var tabBar=h("div",{style:{display:'flex',gap:4,marginBottom:16,alignItems:'center',flexWrap:'wrap'}},

      border:subTab===t.id?'1px solid #58a6ff33':'1px solid #1b1f27',color:subTab===t.id?'#58a6ff':'#6e7681',
      padding:'8px 16px',borderRadius:8,cursor:'pointer',fontSize:12,fontWeight:subTab===t.id?700:400}},t.l)}),
    h("div",{style:{marginLeft:'auto'}},h(ContributeBtn))
  );

  var content=null;
  if(subTab==='combined')content=h(FeedTable,{data:data,generated:generated});
  else if(subTab==='malicious')content=h(FeedTable,{data:malicious,generated:generated});
  else if(subTab==='risky')content=h(FeedTable,{data:risky,generated:generated});
  else if(subTab==='download')content=h(DownloadPanel,{data:data,generated:generated});

  return h("div",null,tabBar,content);
}


/* ── VSIX Analyzer ── */
function uint16LE(b,o){return b[o]|(b[o+1]<<8)}
function uint32LE(b,o){return(b[o])|(b[o+1]<<8)|(b[o+2]<<16)|((b[o+3]<<24)>>>0)}
function parseZipEntries(buf){
  var bytes=new Uint8Array(buf);
  var eocd=-1;
  for(var i=bytes.length-22;i>=Math.max(0,bytes.length-65557);i--){if(uint32LE(bytes,i)===0x06054b50){eocd=i;break;}}
  if(eocd<0)throw new Error('Not a valid ZIP/VSIX file');
  var total=uint16LE(bytes,eocd+10),cdOff=uint32LE(bytes,eocd+16),off=cdOff,entries=[];
  var dec=new TextDecoder();
  for(var idx=0;idx<total;idx++){
    if(uint32LE(bytes,off)!==0x02014b50)break;
    var comp=uint16LE(bytes,off+10),cSize=uint32LE(bytes,off+20),uSize=uint32LE(bytes,off+24);
    var fnLen=uint16LE(bytes,off+28),exLen=uint16LE(bytes,off+30),cmLen=uint16LE(bytes,off+32);
    var locOff=uint32LE(bytes,off+42);
    var name=dec.decode(bytes.slice(off+46,off+46+fnLen));
    entries.push({name:name,comp:comp,cSize:cSize,uSize:uSize,locOff:locOff});
    off+=46+fnLen+exLen+cmLen;
  }
  return{bytes:bytes,entries:entries};
}
async function extractEntry(zip,entry){
  var b=zip.bytes,lo=entry.locOff;
  if(uint32LE(b,lo)!==0x04034b50)throw new Error('Bad local header');
  var fnL=uint16LE(b,lo+26),exL=uint16LE(b,lo+28),start=lo+30+fnL+exL;
  var raw=b.slice(start,start+entry.cSize);
  if(entry.comp===0)return raw;
  if(entry.comp===8){
    var ds=new DecompressionStream('deflate-raw');
    var out=await new Response(new Blob([raw]).stream().pipeThrough(ds)).arrayBuffer();
    return new Uint8Array(out);
  }
  throw new Error('Unsupported compression: '+entry.comp);
}
async function sha256Hex(buf){
  var h=await crypto.subtle.digest('SHA-256',buf);
  return[...new Uint8Array(h)].map(function(b){return b.toString(16).padStart(2,'0')}).join('');
}

function VSIXAnalyzer({data}){
  var h=React.createElement;
  var[file,setFile]=useState(null);
  var[dragging,setDragging]=useState(false);
  var[status,setStatus]=useState('idle');
  var[result,setResult]=useState(null);
  var[error,setError]=useState(null);
  var[showHashes,setShowHashes]=useState(false);
  var fileRef=useRef(null);

  var feedMap=useMemo(function(){
    var m=new Map();
    data.forEach(function(r){m.set(r.extension_id.toLowerCase(),r)});
    return m;
  },[data]);

  var pubMap=useMemo(function(){
    var m=new Map();
    data.forEach(function(r){if(!m.has(r.publisher_id.toLowerCase()))m.set(r.publisher_id.toLowerCase(),r)});
    return m;
  },[data]);

  var analyze=useCallback(async function(f){
    setFile(f);setError(null);setResult(null);setStatus('analyzing');
    try{
      var buf=await f.arrayBuffer();
      var archiveHash=await sha256Hex(buf);
      var zip=parseZipEntries(buf);
      var files=zip.entries.filter(function(e){return!e.name.endsWith('/')});
      var dec=new TextDecoder();

      // Find manifest
      var manEntry=files.find(function(e){return/(^|\/)extension\/package\.json$/i.test(e.name)||/^package\.json$/i.test(e.name)});
      if(!manEntry)throw new Error('package.json not found in this VSIX');
      var manBytes=await extractEntry(zip,manEntry);
      var manifest=JSON.parse(dec.decode(manBytes));
      var extId=(manifest.publisher&&manifest.name)?manifest.publisher+'.'+manifest.name:'';
      var pubId=String(manifest.publisher||'').trim();

      // Feed matching
      var exactHit=extId?feedMap.get(extId.toLowerCase()):null;
      var pubHit=pubId?pubMap.get(pubId.toLowerCase()):null;

      // Capabilities
      var contribs=manifest.contributes&&typeof manifest.contributes==='object'?Object.keys(manifest.contributes).sort():[];
      var caps=[];
      if(manifest.main)caps.push('Node entry: '+manifest.main);
      if(manifest.browser)caps.push('Browser entry: '+manifest.browser);
      if(manifest.extensionKind)caps.push('Extension kind: '+(Array.isArray(manifest.extensionKind)?manifest.extensionKind.join(', '):manifest.extensionKind));
      var actEvents=Array.isArray(manifest.activationEvents)?manifest.activationEvents:[];
      if(actEvents.length)caps.push('Activation: '+actEvents.slice(0,5).join(', ')+(actEvents.length>5?' (+'+( actEvents.length-5)+' more)':''));
      contribs.forEach(function(c){caps.push('Contributes: '+c)});

      // Signal scan + per-file hashing + IP/domain extraction
      var signals={childProcess:false,fileSystem:false,network:false,secrets:false,terminal:false,minified:0,binaries:0,scripts:0,urls:[],ips:[],domains:[]};
      var textExts=/\.(json|js|cjs|mjs|ts|jsx|tsx|md|txt|yaml|yml|xml|html|css|svg|sh|ps1|py)$/i;
      var binExts=/\.(node|exe|dll|so|dylib|jar|class|bin|wasm)$/i;
      var scriptExts=/\.(js|cjs|mjs|ts|jsx|tsx|sh|ps1|py)$/i;
      var peExts=/\.(exe|dll)$/i;
      signals.binaries=files.filter(function(e){return binExts.test(e.name)}).length;
      signals.scripts=files.filter(function(e){return scriptExts.test(e.name)}).length;

      // Per-file hashes
      var fileHashes=[];
      var ipSet=new Set();
      var domainSet=new Set();
      var peSigners=[];

      // IP regex: match IPv4 addresses, exclude obvious non-IPs
      var ipRe=/\b(?:(?:25[0-5]|2[0-4]\d|1\d{2}|[1-9]?\d)\.){3}(?:25[0-5]|2[0-4]\d|1\d{2}|[1-9]?\d)\b/g;
      // Domain regex: reasonable domain patterns in code strings
      var domRe=/(?:^|[\s"'`=(:])([a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?(?:\.[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?)*\.(?:com|net|org|io|dev|app|co|me|info|biz|xyz|cc|ru|cn|tk|top|pw|ws|cloud|live|online|site|tech|sh|ai|gg|to|ly|in|de|uk|fr|eu|pro|tv|la|link|work|fun|lol|zip|mov))\b/gi;
      // Common false-positive domains to skip
      var skipDomains={'github.com':1,'npmjs.org':1,'npmjs.com':1,'nodejs.org':1,'microsoft.com':1,'visualstudio.com':1,
        'typescriptlang.org':1,'mozilla.org':1,'w3.org':1,'schema.org':1,'json-schema.org':1,'example.com':1,
        'localhost':1,'vscode.dev':1,'open-vsx.org':1};

      // Hash + scan all files (cap at 150 files for performance)
      var filesToHash=files.slice(0,150);
      for(var fi=0;fi<filesToHash.length;fi++){
        try{
          var raw=await extractEntry(zip,filesToHash[fi]);
          var h256=await sha256Hex(raw.buffer);
          fileHashes.push({path:filesToHash[fi].name,sha256:h256,size:filesToHash[fi].uSize||raw.length});

          // Text scanning for signals, IPs, domains
          if(textExts.test(filesToHash[fi].name)&&raw.length<2*1024*1024){
            var txt=dec.decode(raw.slice(0,Math.min(raw.length,500000)));
            if(/\bchild_process\b|\bexecSync\b|\bspawnSync\b|\bspawn\s*\(|\bexec\s*\(/i.test(txt))signals.childProcess=true;
            if(/\breadFile\s*\(|\bwriteFile\s*\(|\breaddir\s*\(|\bcreateReadStream\b|\bcreateWriteStream\b/i.test(txt))signals.fileSystem=true;
            if(/https?:\/\/|fetch\s*\(|axios\.|XMLHttpRequest|WebSocket\s*\(|node-fetch/i.test(txt))signals.network=true;
            if(/SecretStorage|secretStorage|authentication\.getSession|process\.env|dotenv/i.test(txt))signals.secrets=true;
            if(/createTerminal\s*\(|registerTerminal/i.test(txt))signals.terminal=true;
            if((filesToHash[fi].name.endsWith('.js')||filesToHash[fi].name.endsWith('.mjs'))&&raw.length>50000){
              var jsLines=txt.split(/\r?\n/);
              var maxLine=jsLines.reduce(function(mx,l){return Math.max(mx,l.length)},0);
              if(maxLine>4000||(jsLines.length<30&&raw.length>120000))signals.minified++;
            }
            // URLs
            var urlM=txt.match(/https?:\/\/[^\s"'`<>()]+/g);
            if(urlM)urlM.forEach(function(u){if(signals.urls.length<40&&signals.urls.indexOf(u)===-1)signals.urls.push(u)});
            // IPs
            var ipM=txt.match(ipRe);
            if(ipM)ipM.forEach(function(ip){
              if(!/^(?:0\.|127\.|10\.|192\.168\.|172\.(?:1[6-9]|2\d|3[01])\.|255\.|224\.)/.test(ip))ipSet.add(ip);
            });
            // Domains
            var domM=txt.match(domRe);
            if(domM)domM.forEach(function(d){
              var clean=d.replace(/^[\s"'`=(:]+/,'').toLowerCase();
              if(clean.indexOf('.')>0&&!skipDomains[clean]&&clean.length>4)domainSet.add(clean);
            });
          }

          if(peExts.test(filesToHash[fi].name)&&raw.length>512){
            // Check MZ header
            if(raw[0]===0x4D&&raw[1]===0x5A){
              var peOff=uint32LE(raw,0x3C);

                var ddOff=magic===0x20B?optHdrOff+112:optHdrOff+96; // PE32+ vs PE32
                var secDirRva=uint32LE(raw,ddOff+32); // Security dir is at index 4
                var secDirSize=uint32LE(raw,ddOff+36);
                var signerInfo={file:filesToHash[fi].name,signed:secDirSize>0,signer:''};
                if(secDirSize>0&&secDirRva>0&&secDirRva+secDirSize<=raw.length){
                  // Try to extract signer CN from the certificate data
                  var certData=raw.slice(secDirRva,Math.min(secDirRva+secDirSize,secDirRva+8192));
                  var certStr='';
                  for(var ci=0;ci<certData.length;ci++){
                    if(certData[ci]>=32&&certData[ci]<127)certStr+=String.fromCharCode(certData[ci]);
                    else certStr+=' ';
                  }

                  var cnMatch=certStr.match(/CN=([^,\s\/\\]{2,80})/);
                  if(cnMatch)signerInfo.signer=cnMatch[1].trim();
                  if(!signerInfo.signer){
                    var oMatch=certStr.match(/O=([^,\s\/\\]{2,80})/);
                    if(oMatch)signerInfo.signer=oMatch[1].trim();
                  }

              }
            }
          }

      }

      signals.ips=Array.from(ipSet).sort();
      signals.domains=Array.from(domainSet).sort();

      // Build findings
      var findings=[];
      if(exactHit)findings.push({lv:'high',t:'Exact feed match',d:'This extension ID is listed in the VSXSentry feed as '+exactHit.metadata_category+'.'});
      else if(pubHit)findings.push({lv:'medium',t:'Publisher in feed',d:'Publisher "'+pubId+'" has other flagged extensions in the feed.'});
      if(actEvents.includes('*')||actEvents.includes('onStartupFinished'))findings.push({lv:'medium',t:'Broad activation',d:'Activates on startup or with wildcard pattern.'});
      if(signals.childProcess)findings.push({lv:'high',t:'Process execution',d:'References child_process, exec, or spawn - can run arbitrary commands.'});
      if(signals.network)findings.push({lv:'medium',t:'Network access',d:'Contains HTTP/fetch/WebSocket patterns - can exfiltrate data.'});
      if(signals.fileSystem)findings.push({lv:'medium',t:'File system access',d:'References readFile/writeFile - can access any file on disk.'});
      if(signals.secrets)findings.push({lv:'medium',t:'Secret/credential access',d:'References SecretStorage, auth sessions, or process.env.'});
      if(signals.terminal)findings.push({lv:'low',t:'Terminal integration',d:'Can create terminals and run commands.'});
      if(signals.binaries>0)findings.push({lv:'high',t:'Native binaries ('+signals.binaries+')',d:'Package contains compiled binaries.'});
      if(signals.minified>0)findings.push({lv:'medium',t:'Minified bundles ('+signals.minified+')',d:'Large minified JS - harder to audit.'});
      if(signals.ips.length>0)findings.push({lv:'high',t:'Hardcoded IPs ('+signals.ips.length+')',d:'Found IP addresses: '+signals.ips.slice(0,5).join(', ')+(signals.ips.length>5?' ...':'')});
      if(signals.domains.length>0)findings.push({lv:'medium',t:'External domains ('+signals.domains.length+')',d:'Found domains: '+signals.domains.slice(0,5).join(', ')+(signals.domains.length>5?' ...':'')});
      var unsignedBins=peSigners.filter(function(p){return!p.signed});
      if(unsignedBins.length>0)findings.push({lv:'high',t:'Unsigned executables ('+unsignedBins.length+')',d:'Unsigned .exe/.dll: '+unsignedBins.map(function(p){return p.file.split('/').pop()}).join(', ')});

      var score=findings.reduce(function(s,f){return s+(f.lv==='high'?3:f.lv==='medium'?2:1)},0);
      var heuristic=score>=9?'critical':score>=5?'high':score>=2?'medium':'low';

      // Dependencies from package.json
      var deps=Object.keys(manifest.dependencies||{});
      var devDeps=Object.keys(manifest.devDependencies||{});

      if(suspiciousDeps.length)findings.push({lv:'high',t:'Suspicious dependencies',d:'Dependencies with concerning names: '+suspiciousDeps.join(', ')});

      // File listing with sizes (top 30 largest)
      var fileList=files.map(function(e){return{name:e.name,size:e.uSize||e.cSize||0}})
        .sort(function(a,b){return b.size-a.size}).slice(0,30);

      // Marketplace download URL for this exact version (universal - no targetPlatform)
      var vsixDownloadUrl=(pubId&&manifest.name&&manifest.version)?
        'https://marketplace.visualstudio.com/_apis/public/gallery/publishers/'+pubId+'/vsextensions/'+manifest.name+'/'+manifest.version+'/vspackage':'';

        fileName:f.name,fileSize:f.size,deps:deps,devDeps:devDeps,fileList:fileList,vsixDownloadUrl:vsixDownloadUrl,
        fileHashes:fileHashes,peSigners:peSigners});

  var onDrop=useCallback(function(e){

  },
    h("input",{ref:fileRef,type:"file",accept:".vsix",style:{display:'none'},onChange:function(e){var f=e.target.files[0];if(f)analyze(f)}}),
    h("div",{style:{fontSize:14,fontWeight:600,color:'#e6edf3',marginBottom:6}},

  if(status==='idle'||status==='analyzing'){
    return h("div",null,
      h("div",{style:{...S.card,marginBottom:16,borderLeft:'3px solid #a371f7'}},
        h("div",{style:{fontSize:14,fontWeight:700,color:'#e6edf3',marginBottom:6}},"VSIX Package Analyzer"),
        h("p",{style:{fontSize:12.5,color:'#8b949e',lineHeight:1.7}},
          "Upload a ",h("code",{style:{color:'#a5d6ff'}},".vsix"),
          " package to parse its manifest, hash the archive, scan code for risk signals, and match against the live feed. Everything runs client-side - nothing leaves your browser.")),
      // VSIX download instructions

        h("div",{style:{fontSize:12,fontWeight:600,color:'#e6edf3',marginBottom:8}},"How to download a VSIX file"),

        h(Code,null,'# Universal extensions (most extensions) - no targetPlatform needed:\nhttps://marketplace.visualstudio.com/_apis/public/gallery/publishers/{PUBLISHER}/vsextensions/{EXTENSION}/{VERSION}/vspackage\n\n# Example - download prettier 11.0.0:\nhttps://marketplace.visualstudio.com/_apis/public/gallery/publishers/esbenp/vsextensions/prettier-vscode/11.0.0/vspackage\n\n# Platform-specific extensions (e.g. C/C++, Python) - append targetPlatform:\nhttps://marketplace.visualstudio.com/_apis/public/gallery/publishers/{PUBLISHER}/vsextensions/{EXTENSION}/{VERSION}/vspackage?targetPlatform={PLATFORM}\n\n# Example - C/C++ extension 1.23.6 for win32-x64:\nhttps://marketplace.visualstudio.com/_apis/public/gallery/publishers/ms-vscode/vsextensions/cpptools/1.23.6/vspackage?targetPlatform=win32-x64\n\n# Platforms: win32-x64, win32-arm64, linux-x64, linux-arm64, darwin-x64, darwin-arm64, alpine-x64, alpine-arm64, web'),

        h("div",{style:{color:'#f85149',fontWeight:600,marginBottom:6}},"Analysis failed"),

      !r.exactHit&&r.pubHit&&h("span",{style:S.tag('#db6d28')},"PUBLISHER IN FEED"),

    h("div",{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(120px,1fr))',gap:10,marginTop:12}},
      [{l:'Files',v:r.fileCount},{l:'Size',v:fmtBytes(r.fileSize)},{l:'Scripts',v:r.signals.scripts},{l:'Binaries',v:r.signals.binaries},{l:'Findings',v:r.findings.length}].map(function(s,i){
        return h("div",{key:i,style:{textAlign:'center',padding:8,background:'#161b22',borderRadius:6}},
          h("div",{style:{fontSize:16,fontWeight:700,color:'#e6edf3',fontFamily:mono}},s.v),

    h("div",{style:{display:'grid',gridTemplateColumns:'140px 1fr',gap:'4px 12px',fontSize:12}},

        return h(React.Fragment,{key:i},
          h("div",{style:{color:'#484f58',padding:'4px 0'}},label),
          h("div",{style:{color:'#e6edf3',fontFamily:mono,padding:'4px 0',wordBreak:'break-all'}},vals[i]));
      })));

  var feedCard=h(Section,{title:"Feed Match"},
    r.exactHit?h("div",{style:{padding:12,background:'#f8514910',border:'1px solid #f8514933',borderRadius:8}},
      h("div",{style:{display:'flex',gap:8,alignItems:'center',marginBottom:6}},
        h("span",{style:S.tag('#f85149')},"EXACT MATCH"),

    "# List VS Code child processes:\nps -ef | grep -E '[c]ode|[e]xtensionHost' | grep -v grep\n\n# Check outbound connections:\nss -tnp | grep -i code\n# or: lsof -i -P -n | grep code\n\n# Check for persistence:\ncrontab -l 2>/dev/null | grep -i 'code\\|vscode\\|node'\nsystemctl --user list-units --type=service | grep -i 'code\\|vscode'\nls -la ~/.config/autostart/ 2>/dev/null | grep -i code\n\n# Check for suspicious files written by extensions:\nfind ~/.vscode/extensions -name '*.sh' -o -name '*.py' |\n  xargs ls -la 2>/dev/null\n\n# Recent file modifications in extension dirs:\nfind ~/.vscode/extensions -mtime -7 -type f | sort";

  var stateDbCmd="# The state.vscdb file is a SQLite database containing extension metadata.\n# It records install timestamps, activation events, and configuration state.\n\n"+(os==='windows'?
    "# Windows:\nsqlite3 \"%APPDATA%\\Code\\User\\globalStorage\\state.vscdb\" \\\n  \"SELECT key, value FROM ItemTable WHERE key LIKE '%extension%' LIMIT 50;\"":
    "# "+(os==='macos'?"macOS":"Linux")+":\nsqlite3 "+(os==='macos'?"~/Library/Application\\ Support/Code":"~/.config/Code")+"/User/globalStorage/state.vscdb \\\n  \"SELECT key, value FROM ItemTable WHERE key LIKE '%extension%' LIMIT 50;\"")+
    "\n\n# Key entries to look for:\n# extensionsIdentifiers/disabled  - manually disabled extensions\n# extensionGalleryService.cache   - marketplace metadata cache\n# extensionsAssistant/...         - recommendation history\n# storage.serviceMachineId        - unique machine identifier\n\n# Extension host logs record activation with timestamps:\n# Look for lines containing 'activating extension' and\n# 'eager extensions activated' for timeline reconstruction.";

  var inventoryCmd="# Quick inventory of all installed extensions:\ncode --list-extensions --show-versions 2>/dev/null | sort\n\n# Compare against VSXSentry feed (cross-platform):\npython3 -c \"\nimport json, subprocess, urllib.request\nfeed_url = '"+FEED_REMOTE+"'\ntry:\n    feed = json.loads(urllib.request.urlopen(feed_url, timeout=10).read())\n    iocs = {r['extension_id'].lower() for r in feed.get('records', [])}\n    result = subprocess.run(['code', '--list-extensions'], capture_output=True, text=True)\n    installed = [l.strip().lower() for l in result.stdout.splitlines() if '.' in l]\n    matched = [e for e in installed if e in iocs]\n    print(f'Checked {len(installed)} extensions, {len(matched)} feed matches')\n    for m in matched: print(f'  MATCH: {m}')\nexcept Exception as e: print(f'Error: {e}')\n\"\n\n# Also check VS Code variants:\n# code-insiders --list-extensions --show-versions\n# codium --list-extensions --show-versions\n# cursor --list-extensions --show-versions";

  return h("div",null,
    h("div",{style:{...S.card,marginBottom:20,borderLeft:'3px solid #f85149',borderColor:'#1b1f27',borderLeftColor:'#f85149'}},
      h("div",{style:{fontSize:14,fontWeight:700,color:'#e6edf3',marginBottom:6}},"Investigation Scenario"),
      h("p",{style:{fontSize:13,color:'#8b949e',lineHeight:1.8,margin:0}},
        "A suspicious VS Code extension has been found on a developer workstation. Determine ",
        h("strong",null,"when")," it was installed, ",h("strong",null,"how")," it got there (marketplace, sideloaded .vsix, workspace recommendation, Settings Sync, or policy push), and whether it executed malicious payloads (credential theft, code exfiltration, reverse shell, cryptominer).")),
    h(OsToggle,{os:os,setOs:setOs}),
    h(Section,{title:"1. Storage Paths & Key Artifacts"},
      h(Code,null,extPaths[os]),
      h(Callout,{type:"tip"},"Also check for VS Code Insiders, VSCodium, and Cursor - they use parallel directories. Remote development (SSH, WSL, Dev Containers, Codespaces) stores extensions on the remote host, not locally.")),
    h(Section,{title:"2. Extension Directory Analysis"},
      h("div",{style:{fontSize:12.5,color:'#8b949e',lineHeight:1.8,marginBottom:10}},
        "Each extension lives in ",h("code",{style:{color:'#a5d6ff'}},"publisher.name-version/"),". Critical files to examine:"),
      h(Code,null,
        "~/.vscode/extensions/publisher.extension-name-1.2.3/\n  package.json          # Manifest: activationEvents, main, dependencies\n  extension.js          # Main entry - check for obfuscation, eval(), Function()\n  node_modules/         # Dependency tree - look for typosquatted packages\n  .vsixmanifest         # Original VSIX metadata, signature info\n  dist/ or out/         # Compiled output - minified bundles are harder to audit\n\n# RED FLAGS in package.json:\n#   \"activationEvents\": [\"*\"]          - activates on everything\n#   \"activationEvents\": [\"onStartupFinished\"]  - silent startup\n#   scripts.postinstall or preinstall   - runs arbitrary code on install\n#   Suspicious dependencies (child_process wrappers, network libs)\n#   \"extensionKind\": [\"workspace\"]      - runs on remote hosts too"),
      h(Callout,{type:"critical"},"Malicious extensions have been found using invisible Unicode characters (zero-width spaces) to hide code in plain sight. Use a hex editor or ",h("code",{style:{color:'#a5d6ff'}},"cat -A")," to reveal hidden payloads. Also check for base64-encoded strings and Discord webhook URLs in extension.js.")),
    h(Section,{title:"3. Process Tree & Network Activity"},
      h(Code,null,processCmd)),
    h(Section,{title:"4. State Database & Log Analysis"},
      h(Code,null,stateDbCmd)),
    h(Section,{title:"5. Quick Inventory & Feed Check"},
      h(Code,null,inventoryCmd)),
    h(Section,{title:"6. What to Preserve as Evidence"},
      h("div",{style:{fontSize:12.5,color:'#8b949e',lineHeight:1.8}},
        "Before cleanup, preserve: the entire extension directory (zip it), the package.json manifest, SHA-256 hash of any .vsix file, state.vscdb database, extension host logs for the incident window, settings.json and .vscode/extensions.json from affected workspaces, process listings and network connection snapshots, and any matched feed metadata. For supply-chain incidents, also preserve the VSIX from the CachedExtensionVSIXs directory if available.")));
}

/* ── Investigation Guide: Remediation ── */
function RemediationPanel(){
  var h=React.createElement;
  var[os,setOs]=useState('windows');

  var removeCmd=os==='windows'?
    "# 1. Kill VS Code to prevent re-activation\nGet-Process -Name 'Code','Code - Insiders' -ErrorAction SilentlyContinue | Stop-Process -Force\n\n# 2. Preserve evidence (zip before removing)\nCompress-Archive -Path \"$HOME\\.vscode\\extensions\\publisher.extension-name-*\" -DestinationPath \"$HOME\\Desktop\\evidence_extension.zip\"\n\n# 3. Remove via CLI\ncode --uninstall-extension publisher.extension-name\n\n# 4. Manual removal (if CLI fails or extension is hidden)\nRemove-Item -Recurse -Force \"$HOME\\.vscode\\extensions\\publisher.extension-name-*\"\nRemove-Item -Force \"$env:APPDATA\\Code\\CachedExtensionVSIXs\\publisher.extension-name-*\" -ErrorAction SilentlyContinue\n\n# 5. Check all user profiles on the machine\nGet-ChildItem C:\\Users\\*\\.vscode\\extensions\\publisher.extension-name-* -ErrorAction SilentlyContinue":
  os==='macos'?
    "# 1. Kill VS Code\nkillall 'Electron' 2>/dev/null; killall 'Code Helper' 2>/dev/null\n\n# 2. Preserve evidence\ntar czf ~/Desktop/evidence_extension.tar.gz ~/.vscode/extensions/publisher.extension-name-* 2>/dev/null\n\n# 3. Remove via CLI\ncode --uninstall-extension publisher.extension-name\n\n# 4. Manual removal\nrm -rf ~/.vscode/extensions/publisher.extension-name-*\nrm -f ~/Library/Application\\ Support/Code/CachedExtensionVSIXs/publisher.extension-name-*\n\n# 5. Check all users\nsudo find /Users -maxdepth 4 -path '*/.vscode/extensions/publisher.extension-name-*' -type d 2>/dev/null":
    "# 1. Kill VS Code\npkill -f 'code' 2>/dev/null\n\n# 2. Preserve evidence\ntar czf ~/Desktop/evidence_extension.tar.gz ~/.vscode/extensions/publisher.extension-name-* 2>/dev/null\n\n# 3. Remove via CLI\ncode --uninstall-extension publisher.extension-name\n\n# 4. Manual removal\nrm -rf ~/.vscode/extensions/publisher.extension-name-*\nrm -f ~/.config/Code/CachedExtensionVSIXs/publisher.extension-name-*\n\n# 5. Check all users\nsudo find /home -maxdepth 4 -path '*/.vscode/extensions/publisher.extension-name-*' -type d 2>/dev/null";

  var persistenceCmd=os==='windows'?
    "# Settings Sync can reinstall the extension on all synced machines:\nGet-Content \"$env:APPDATA\\Code\\User\\settings.json\" | Select-String 'sync'\n# Disable: set \"settingsSync.enabled\": false\n\n# Workspace recommendations (.vscode/extensions.json) can prompt reinstall:\nGet-ChildItem -Recurse -Path $HOME\\Projects -Filter 'extensions.json' -ErrorAction SilentlyContinue | Select-String 'publisher.extension'\n\n# devcontainer.json can force-install extensions:\nGet-ChildItem -Recurse -Path $HOME\\Projects -Filter 'devcontainer.json' -ErrorAction SilentlyContinue | Select-String 'publisher.extension'\n\n# Scheduled tasks (some malware installs persistence here):\nGet-ScheduledTask | Where-Object { $_.Actions.Execute -match 'node|code|vscode' }":
  os==='macos'?
    "# Settings Sync:\ngrep -i 'sync' ~/Library/Application\\ Support/Code/User/settings.json\n\n# Workspace recommendations:\nfind ~/Projects ~/Developer -name 'extensions.json' -path '*/.vscode/*' -exec grep -l 'publisher.extension' {} \\; 2>/dev/null\n\n# devcontainer.json:\nfind ~/Projects ~/Developer -name 'devcontainer.json' -exec grep -l 'publisher.extension' {} \\; 2>/dev/null\n\n# LaunchAgents:\nfor f in ~/Library/LaunchAgents/*.plist; do plutil -p \"$f\" 2>/dev/null | grep -iE 'node|code'; done\n\n# Login Items:\nosascript -e 'tell application \"System Events\" to get every login item'":
    "# Settings Sync:\ngrep -i 'sync' ~/.config/Code/User/settings.json\n\n# Workspace recommendations:\nfind ~ -maxdepth 5 -name 'extensions.json' -path '*/.vscode/*' -exec grep -l 'publisher.extension' {} \\; 2>/dev/null\n\n# devcontainer.json:\nfind ~ -maxdepth 5 -name 'devcontainer.json' -exec grep -l 'publisher.extension' {} \\; 2>/dev/null\n\n# Cron/systemd:\ncrontab -l 2>/dev/null | grep -iE 'code|vscode|node'\nsystemctl --user list-units --type=service 2>/dev/null | grep -iE 'code|vscode'";

  var credCmd="# ROTATION PRIORITY (assume everything readable by the user is compromised):\n\n# 1. SSH keys - regenerate and replace on all services\nls -la ~/.ssh/\n\n# 2. Git tokens - revoke PATs on GitHub/GitLab/Bitbucket\ngit config --global --list | grep credential\n# https://github.com/settings/tokens\n\n# 3. Cloud credentials\naws sts get-caller-identity 2>/dev/null   # AWS\ngcloud auth list 2>/dev/null              # GCP\naz account show 2>/dev/null               # Azure\n\n# 4. Package registry tokens (check for unauthorized publishes)\nnpm whoami 2>/dev/null && npm token list\n\n# 5. Secrets in env and .env files\nenv | grep -iE 'key|token|secret|password|api' | grep -v '^_'\nfind ~/Projects ~/src -name '.env' -o -name '.env.*' 2>/dev/null\n\n# 6. Disable Settings Sync and re-authenticate\n# Sign out: Accounts icon -> Sign Out of all accounts";

  return h("div",null,
    h(OsToggle,{os:os,setOs:setOs}),
    h(Section,{title:"Step 1 - Isolate and Remove the Extension"},
      h(Callout,{type:"warn"},"Preserve evidence BEFORE removing. Zip the extension directory and capture network connections first."),
      h(Code,null,removeCmd)),
    h(Section,{title:"Step 2 - Hunt for Persistence Mechanisms"},
      h(Callout,{type:"info"},"Extensions can persist through Settings Sync (reinstalls across all synced machines), workspace recommendations (.vscode/extensions.json), devcontainer.json, and scheduled tasks. Disable Settings Sync during remediation."),
      h(Code,null,persistenceCmd)),
    h(Section,{title:"Step 3 - Credential and Secret Rotation"},
      h(Callout,{type:"critical"},"If a malicious extension was active, assume ALL credentials accessible from the workstation are compromised. Extensions run as Node.js with full file system access."),
      h(Code,null,credCmd)),
    h(Section,{title:"Step 4 - Enterprise Hardening"},
      h(Callout,{type:"info"},"Post-incident hardening checklist for security teams. Use the Policy Generator and Scripts tabs to implement these controls."),
      h(Code,null,
        "# 1. Deploy AllowedExtensions policy (Policy Generator tab)\n# 2. Disable Settings Sync or restrict to managed accounts\n# 3. Audit .vscode/extensions.json and devcontainer.json in all repos\n# 4. Scan fleet: deploy inventory script from tools/ directory\n# 5. Disable auto-updates: \"extensions.autoUpdate\": false via GPO\n# 6. EDR: alert on child_process spawns from extensionHost\n# 7. Network: alert on Discord webhook, pastebin, raw GitHub URLs from code.exe\n# 8. Baseline approved extensions and monitor for drift\n# 9. Rotate credentials on a 90-day cycle, use vault injection\n# 10. Run VSXSentry detection scripts on a schedule (Scripts tab)")));
}

/* ── Script Generator ── */
function ScriptGenerator({data}){
  var h=React.createElement;
  var[os,setOs]=useState('windows');
  var[variant,setVariant]=useState('code');
  var[action,setAction]=useState('detect');
  var[scope,setScope]=useState('malicious');
  var[minSev,setMinSev]=useState('all');
  var[dryRun,setDryRun]=useState(true);
  var[autoConfirm,setAutoConfirm]=useState(false);
  var[feedUrl,setFeedUrl]=useState('https://vsxsentry.github.io/feeds/');

  var sevRank={critical:4,high:3,medium:2,low:1,info:0};
  var filtered=useMemo(function(){
    var d=data;
    if(scope==='malicious')d=d.filter(function(r){return!(r.metadata_category||'').startsWith('risky-')});
    if(scope==='risky')d=d.filter(function(r){return(r.metadata_category||'').startsWith('risky-')});
    if(minSev!=='all')d=d.filter(function(r){return(sevRank[r.metadata_severity]||0)>=(sevRank[minSev]||0)});
    return d;
  },[data,scope,minSev]);

  var ids=filtered.map(function(r){return r.extension_id});

  // Feed file to use based on scope
  var feedFile=scope==='malicious'?'ioc_all_extension_ids.txt':scope==='risky'?'risky_extension_ids.txt':'ioc_all_extension_ids.txt';
  var fullFeedUrl=feedUrl+feedFile;

  // Build script based on config
  var script=useMemo(function(){
    var v=variant;
    var dr=dryRun;
    var ac=autoConfirm;
    var act=action;
    var total=ids.length;
    var ts=new Date().toISOString();

    if(os==='windows'){
      // ── PowerShell script ──
      var lines=[];
      lines.push('#Requires -Version 5.1');
      lines.push('<#');
      lines.push('  VSXSentry - VS Code Extension '+act.charAt(0).toUpperCase()+act.slice(1)+' Script');
      lines.push('  Generated : '+ts);
      lines.push('  Scope     : '+scope+' ('+total+' extensions in UI at generation time)');
      lines.push('  Action    : '+act+(dr?' [DRY RUN]':''));
      lines.push('  Variant   : '+v);
      lines.push('  Feed      : '+fullFeedUrl);
      lines.push('#>');
      lines.push('');
      lines.push('$ErrorActionPreference = "Stop"');
      lines.push('$VerbosePreference     = "Continue"');
      lines.push('');

      // --- Find VS Code CLI ---
      lines.push('# ── Step 1: Locate VS Code CLI ──');
      lines.push('Write-Host "[*] Searching for '+v+' CLI..." -ForegroundColor Cyan');
      lines.push('$codeBin = $null');
      lines.push('');
      lines.push('# Try PATH first');
      lines.push('$codeBin = Get-Command "'+v+'" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source');
      lines.push('if (-not $codeBin) {');
      lines.push('    Write-Verbose "Not found in PATH, checking common install locations..."');
      lines.push('    $candidates = @(');
      if(v==='code'){
        lines.push('        "$env:LOCALAPPDATA\\Programs\\Microsoft VS Code\\bin\\code.cmd"');
        lines.push('        "$env:ProgramFiles\\Microsoft VS Code\\bin\\code.cmd"');
        lines.push('        "$env:ProgramFiles(x86)\\Microsoft VS Code\\bin\\code.cmd"');
      } else if(v==='code-insiders'){
        lines.push('        "$env:LOCALAPPDATA\\Programs\\Microsoft VS Code Insiders\\bin\\code-insiders.cmd"');
        lines.push('        "$env:ProgramFiles\\Microsoft VS Code Insiders\\bin\\code-insiders.cmd"');
      } else if(v==='codium'){
        lines.push('        "$env:LOCALAPPDATA\\Programs\\VSCodium\\bin\\codium.cmd"');
        lines.push('        "$env:ProgramFiles\\VSCodium\\bin\\codium.cmd"');
      } else if(v==='cursor'){
        lines.push('        "$env:LOCALAPPDATA\\Programs\\Cursor\\resources\\app\\bin\\cursor.cmd"');
        lines.push('        "$env:LOCALAPPDATA\\cursor\\Cursor.exe"');
      }
      lines.push('    )');
      lines.push('    foreach ($path in $candidates) {');
      lines.push('        if (Test-Path $path) { $codeBin = $path; break }');
      lines.push('    }');
      lines.push('}');
      lines.push('if (-not $codeBin) {');
      lines.push('    Write-Host "[!] ERROR: Could not find '+v+' CLI." -ForegroundColor Red');
      lines.push('    Write-Host "    Searched PATH and common install locations." -ForegroundColor Red');
      lines.push('    Write-Host "    Install VS Code or add it to PATH, then retry." -ForegroundColor Yellow');
      lines.push('    exit 1');
      lines.push('}');
      lines.push('Write-Host "[+] Found CLI: $codeBin" -ForegroundColor Green');
      lines.push('');

      // --- Fetch feed ---
      lines.push('# ── Step 2: Fetch VSXSentry feed ──');
      lines.push('$feedUrl  = "'+fullFeedUrl+'"');
      lines.push('$fallback = "https://raw.githubusercontent.com/mthcht/awesome-lists/refs/heads/main/Lists/VSCODE%20Extensions/feeds/vsxsentry_feed.json"');
      lines.push('Write-Host "[*] Fetching feed from $feedUrl ..." -ForegroundColor Cyan');
      lines.push('$feedIds = $null');
      lines.push('try {');
      lines.push('    [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12');
      lines.push('    $raw = Invoke-RestMethod -Uri $feedUrl -TimeoutSec 30 -ErrorAction Stop');
      lines.push('    $feedIds = ($raw -split "`n") | Where-Object { $_.Trim() } | ForEach-Object { $_.Trim().ToLower() }');
      lines.push('} catch {');
      lines.push('    Write-Host "[!] Primary feed failed: $_" -ForegroundColor Yellow');
      lines.push('    Write-Host "[*] Trying fallback..." -ForegroundColor Cyan');
      lines.push('    try {');
      lines.push('        $json = Invoke-RestMethod -Uri $fallback -TimeoutSec 30 -ErrorAction Stop');
      lines.push('        $feedIds = $json.records | ForEach-Object { $_.extension_id.ToLower() }');
      if(scope==='malicious'){
        lines.push('        $feedIds = $json.records | Where-Object { -not $_.metadata_category.StartsWith("risky-") } | ForEach-Object { $_.extension_id.ToLower() }');
      } else if(scope==='risky'){
        lines.push('        $feedIds = $json.records | Where-Object { $_.metadata_category.StartsWith("risky-") } | ForEach-Object { $_.extension_id.ToLower() }');
      }
      lines.push('    } catch {');
      lines.push('        Write-Host "[!] ERROR: Both feeds unreachable. Check network." -ForegroundColor Red');
      lines.push('        Write-Host "    Primary  : $feedUrl" -ForegroundColor Red');
      lines.push('        Write-Host "    Fallback : $fallback" -ForegroundColor Red');
      lines.push('        exit 1');
      lines.push('    }');
      lines.push('}');
      lines.push('if (-not $feedIds -or $feedIds.Count -eq 0) {');
      lines.push('    Write-Host "[!] ERROR: Feed returned 0 IDs. Check URL or format." -ForegroundColor Red');
      lines.push('    exit 1');
      lines.push('}');
      lines.push('Write-Host "[+] Loaded $($feedIds.Count) extension IDs from feed" -ForegroundColor Green');
      lines.push('');

      if(act==='block'){
        // Block: generate policy JSON
        lines.push('# ── Step 3: Generate block policy ──');
        lines.push('$policy = [ordered]@{ "*" = $true }');
        lines.push('foreach ($id in $feedIds) { $policy[$id] = $false }');
        lines.push('$wrapper = [ordered]@{ "extensions.allowed" = $policy }');
        lines.push('$json = $wrapper | ConvertTo-Json -Depth 3');
        lines.push('$outPath = Join-Path $env:TEMP "vsxsentry_block_policy.json"');
        lines.push('$json | Out-File -FilePath $outPath -Encoding UTF8');
        if(dr){
          lines.push('Write-Host "[DRY RUN] Policy written to: $outPath" -ForegroundColor Yellow');
          lines.push('Write-Host "[+] Review the file, then merge into your VS Code settings or GPO." -ForegroundColor Cyan');
        } else {
          lines.push('$settingsDir = "$env:APPDATA\\Code\\User"');
          lines.push('if (-not (Test-Path $settingsDir)) { $settingsDir = "$env:APPDATA\\'+v.replace('code','Code').replace('-insiders',' - Insiders')+'\\User" }');
          lines.push('$settingsPath = Join-Path $settingsDir "settings.json"');
          lines.push('Write-Host "[*] Merging policy into $settingsPath ..." -ForegroundColor Cyan');
          lines.push('if (Test-Path $settingsPath) {');
          lines.push('    $existing = Get-Content $settingsPath -Raw | ConvertFrom-Json');
          lines.push('} else {');
          lines.push('    $existing = [PSCustomObject]@{}');
          lines.push('}');
          lines.push('$existing | Add-Member -NotePropertyName "extensions.allowed" -NotePropertyValue $policy -Force');
          lines.push('$existing | ConvertTo-Json -Depth 5 | Set-Content $settingsPath -Encoding UTF8');
          lines.push('Write-Host "[+] Policy applied to $settingsPath ($($feedIds.Count) extensions blocked)" -ForegroundColor Green');
        }
      } else {
        // Detect/Remove: list installed, match, act
        lines.push('# ── Step 3: List installed extensions ──');
        lines.push('Write-Host "[*] Listing installed extensions..." -ForegroundColor Cyan');
        lines.push('try {');
        lines.push('    $installed = & $codeBin --list-extensions 2>&1');
        lines.push('    if ($LASTEXITCODE -ne 0) { throw "Exit code $LASTEXITCODE" }');
        lines.push('} catch {');
        lines.push('    Write-Host "[!] ERROR: Failed to list extensions: $_" -ForegroundColor Red');
        lines.push('    Write-Host "    Tried: $codeBin --list-extensions" -ForegroundColor Red');
        lines.push('    exit 1');
        lines.push('}');
        lines.push('if (-not $installed) {');
        lines.push('    Write-Host "[+] No extensions installed. Nothing to check." -ForegroundColor Green');
        lines.push('    exit 0');
        lines.push('}');
        lines.push('$installedList = @($installed) | ForEach-Object { $_.Trim() } | Where-Object { $_ }');
        lines.push('Write-Host "[+] Found $($installedList.Count) installed extensions" -ForegroundColor Green');
        lines.push('');
        lines.push('# ── Step 4: Match against feed ──');
        lines.push('$matches = @($installedList | Where-Object { $feedIds -contains $_.ToLower() })');
        lines.push('if ($matches.Count -eq 0) {');
        lines.push('    Write-Host "[+] No matching extensions found - all clean!" -ForegroundColor Green');
        lines.push('    exit 0');
        lines.push('}');
        lines.push('Write-Host ""');
        lines.push('Write-Host "[!] ALERT: $($matches.Count) matching extension(s) found:" -ForegroundColor Red');
        lines.push('$matches | ForEach-Object { Write-Host "    - $_" -ForegroundColor Yellow }');
        lines.push('Write-Host ""');

        if(act==='detect'){
          lines.push('# ── Results ──');
          lines.push('Write-Host "[+] Detection complete: $($matches.Count) match(es) out of $($installedList.Count) installed" -ForegroundColor Cyan');
          lines.push('exit $matches.Count');
        }
        if(act==='remove'){
          lines.push('# ── Step 5: Remove matched extensions ──');
          if(dr){
            lines.push('Write-Host "[DRY RUN] The following extensions WOULD be removed:" -ForegroundColor Yellow');
            lines.push('$matches | ForEach-Object { Write-Host "    [DRY RUN] $_" -ForegroundColor Yellow }');
            lines.push('Write-Host ""');
            lines.push('Write-Host "[+] Dry run complete. Disable dry-run to execute removal." -ForegroundColor Cyan');
          } else {
            if(!ac){
              lines.push('$confirm = Read-Host "Proceed with removal of $($matches.Count) extension(s)? (y/N)"');
              lines.push('if ($confirm -ne "y") { Write-Host "Aborted by user."; exit 0 }');
              lines.push('');
            }
            lines.push('$removed = 0; $failed = 0');
            lines.push('foreach ($ext in $matches) {');
            lines.push('    Write-Host "[*] Removing $ext ..." -ForegroundColor Red');
            lines.push('    try {');
            lines.push('        & $codeBin --uninstall-extension $ext --force 2>&1 | Out-Null');
            lines.push('        if ($LASTEXITCODE -eq 0) {');
            lines.push('            Write-Host "    [OK] Removed $ext" -ForegroundColor Green');
            lines.push('            $removed++');
            lines.push('        } else {');
            lines.push('            Write-Host "    [FAIL] Exit code $LASTEXITCODE for $ext" -ForegroundColor Yellow');
            lines.push('            $failed++');
            lines.push('        }');
            lines.push('    } catch {');
            lines.push('        Write-Host "    [FAIL] Error removing ${ext}: $_" -ForegroundColor Yellow');
            lines.push('        $failed++');
            lines.push('    }');
            lines.push('}');
            lines.push('Write-Host ""');
            lines.push('Write-Host "[+] Done: $removed removed, $failed failed out of $($matches.Count) total" -ForegroundColor Cyan');
            lines.push('if ($failed -gt 0) { exit 1 } else { exit 0 }');
